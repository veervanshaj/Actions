name: My First Workflow

on: push

jobs:
  lint: #job 1
    runs-on: ubuntu-latest

    steps:
      - name: checkout code #setup project /clon
        uses: actions/checkout@v4
        
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: check node version
        run: node -v
      - name: dounload dependncy
        run: npm i

      - name: Lint code
        run: npm run lint
      - name: kaya lint chala
        run: echo "challaaa"
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code #setup project /clon
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: run test
        run: npm run test  
      - name: dounload dependncy
        run: npm i
      
  build: #job3
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code #setup project /clon
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: kaya build chala
        run: echo "chalaaaaa"
