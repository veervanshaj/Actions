jobs:
  test: #job 1
    runs-on: ubuntu-latest

    steps:
      - name: checkout code #setup project /clon
        uses: actions/checkout@v4
        
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: check node version
        run: node -v
      - name: dounload dependncy
        run: npm i
      - name: run test
        run: npm run test  
