name: My First Workflow

on: push

jobs:
  deply-app: #job 1
    runs-on: ubuntu-latest

    steps:
      - name: Print messages
        run: |
          echo "Hello, GitHub Actions!"
          echo "Veer Vanshaj"
  say-bye:  #job 2
    runs-on: ubuntu-latest
    needs: deply-app
    steps:
      - name: Print messages
        run: echo "Goodbye from second job"
          
